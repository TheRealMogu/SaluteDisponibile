[build]
  command = "vite build"
  publish = "dist/public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Tutte le richieste /api/* vanno alla funzione Express
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA fallback — tutte le altre route servono index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
